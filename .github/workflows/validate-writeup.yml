name: Validate Writeup

on:
  pull_request:
    paths:
      - "writeups/**/*.md"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Get changed writeup files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'writeups/**/*.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate frontmatter
        env:
          WRITEUP_GIT_NICKNAME: ${{ github.event.pull_request.user.login }}
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No writeup files changed."
            exit 0
          fi
          while IFS= read -r file; do
            if [ -z "$file" ]; then
              continue
            fi
            python scripts/validate_frontmatter.py "$file"
          done <<< "$FILES"
